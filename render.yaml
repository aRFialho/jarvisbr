services:
  - type: web
    name: jarvis-api
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm --workspace api run build
    startCommand: npm --workspace api run db:migrate:prod && npm --workspace api run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DEVICE_TOKEN_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://jarvis-web-9c5d.onrender.com
      - key: ANDROID_APK_URL
        sync: false
      - key: WINDOWS_AGENT_URL
        sync: false

  - type: web
    name: jarvis-web
    runtime: static
    buildCommand: npm ci --include=dev && npm --workspace apps/web run build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://jarvis-api-n9wv.onrender.com

